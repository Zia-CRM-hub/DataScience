name: Data Science Dashboard Tests

on:
  push:
    branches: [ main ]
    paths:
    - data_science_dashboard_project/**
    - .github/workflows/data-science-dashboard-tests.yml
  pull_request:
    branches: [ main ]
    paths:
    - data_science_dashboard_project/**
    - .github/workflows/data-science-dashboard-tests.yml

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r data_science_dashboard_project/requirements.txt
        pip install -e data_science_dashboard_project/python-package

    - name: Run tests
      run: |
        pytest data_science_dashboard_project/tests -v
