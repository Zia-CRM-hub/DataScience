name: Project Isolation Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  isolation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run isolation validation
      run: python tools/check_project_isolation.py